{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>

Login - MCA NotesHub

</title>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:"Segoe UI",sans-serif;

transition:all .3s ease;

}

body{

min-height:100vh;

background:

linear-gradient(

rgba(243,244,246,.82),

rgba(243,244,246,.82)

),

url(
"{% static 'images/bookimage.avif' %}"
);

background-size:cover;

background-position:center;

background-repeat:no-repeat;

color:#111827;

position:relative;

overflow-x:hidden;

overflow-y:auto;

}

/* Floating blur */

body::before{

content:"";

position:absolute;

top:-100px;

left:-100px;

width:280px;

height:280px;

background:

rgba(
59,
130,
246,
.12
);

border-radius:50%;

filter:blur(90px);

animation:float1 8s ease infinite;

}

body::after{

content:"";

position:absolute;

bottom:-100px;

right:-100px;

width:260px;

height:260px;

background:

rgba(
99,
102,
241,
.10
);

border-radius:50%;

filter:blur(90px);

animation:float2 8s ease infinite;

}

/* NAVBAR */

.navbar{

width:100%;

padding:15px 30px;

background:

rgba(
255,
255,
255,
.30
);

backdrop-filter:blur(15px);

border-bottom:

1px solid

rgba(
255,
255,
255,
.25
);

display:flex;

justify-content:space-between;

align-items:center;

position:relative;

z-index:20;

}

.logo{

font-size:24px;

font-weight:700;

color:#374151;

}

.nav-links{

display:flex;

gap:10px;

flex-wrap:wrap;

}

.nav-links a{

text-decoration:none;

padding:10px 14px;

border-radius:8px;

color:#374151;

}

.nav-links a:hover{

background:

rgba(
255,
255,
255,
.4
);

}

/* MAIN */

.main-container{

min-height:

calc(
100vh - 75px
);

display:flex;

justify-content:center;

align-items:center;

padding:20px;

position:relative;

z-index:10;

}

/* LOGIN BOX */

.container{

width:100%;

max-width:390px;

padding:35px;

border-radius:22px;

background:

rgba(
255,
255,
255,
.20
);

backdrop-filter:blur(18px);

-webkit-backdrop-filter:blur(18px);

border:

1px solid

rgba(
255,
255,
255,
.35
);

box-shadow:

0 18px 45px

rgba(
0,
0,
0,
.08
);

animation:fadeUp .8s ease;

}

.title{

text-align:center;

font-size:32px;

font-weight:700;

margin-bottom:25px;

}

/* FORM */

form{

display:flex;

flex-direction:column;

}

input{

width:100%;

padding:14px;

margin-bottom:15px;

border:

1px solid

rgba(
255,
255,
255,
.4
);

border-radius:10px;

background:

rgba(
255,
255,
255,
.55
);

outline:none;

}

input:focus{

border-color:#6b7280;

box-shadow:

0 0 0 4px

rgba(
55,
65,
81,
.08
);

}

.submit{

padding:14px;

border:none;

border-radius:10px;

background:#374151;

color:white;

font-weight:600;

cursor:pointer;

}

.submit:hover{

transform:translateY(-2px);

box-shadow:

0 10px 20px

rgba(
55,
65,
81,
.18
);

}

.signup-link{

margin-top:18px;

text-align:center;

font-size:14px;

}

.signup-link a{

text-decoration:none;

font-weight:700;

color:#374151;

}

/* ANIMATION */

@keyframes fadeUp{

from{

opacity:0;

transform:
translateY(40px);

}

to{

opacity:1;

transform:
translateY(0);

}

}

@keyframes float1{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-20px);
}

100%{
transform:translateY(0);
}

}

@keyframes float2{

0%{
transform:translateY(0);
}

50%{
transform:translateY(20px);
}

100%{
transform:translateY(0);
}

}

/* MOBILE */

@media(max-width:768px){

body{

background-size:cover;

background-position:center top;

}

/* hide blobs */

body::before,
body::after{

display:none;

}

.navbar{

padding:16px;

flex-direction:column;

gap:12px;

text-align:center;

}

.logo{

font-size:22px;

}

.nav-links{

width:100%;

justify-content:center;

gap:8px;

}

.nav-links a{

padding:8px 10px;

font-size:14px;

}

.main-container{

padding:35px 18px;

align-items:flex-start;

}

.container{

max-width:100%;

padding:24px;

border-radius:18px;

}

.title{

font-size:26px;

margin-bottom:20px;

}

input{

padding:12px;

font-size:15px;

}

.submit{

padding:13px;

}

}

</style>

</head>

<body>

<nav class="navbar">

<div class="logo">

NotesHub

</div>

<div class="nav-links">

<a href="{% url 'home' %}">

Home

</a>

<a href="{% url 'login' %}">

Login

</a>

<a href="{% url 'signup' %}">

Signup

</a>

<a href="{% url 'contact' %}">

Contact

</a>

</div>

</nav>

<div class="main-container">

<div class="container">

<div class="title">

Login

</div>

<form
method="POST"
action="{% url 'login' %}"
>

{% csrf_token %}

<input
type="text"
name="username"
placeholder="Username"
required
>

<input
type="password"
name="password"
placeholder="Password"
required
>

<button
type="submit"
class="submit"
>

Login

</button>

<div class="signup-link">

Don't have an account?

<a href="{% url 'signup' %}">

Signup

</a>

</div>

</form>

</div>

</div>

</body>

</html>
