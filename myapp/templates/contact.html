{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>

Contact Us - MCA NotesHub

</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
transition:all .3s ease;
}

body{

min-height:100vh;

background:

linear-gradient(
rgba(243,244,246,.82),
rgba(243,244,246,.82)
),

url(
"{% static 'images/bookimage.avif' %}"
);

background-size:cover;

background-position:center;

background-repeat:no-repeat;

overflow-x:hidden;

overflow-y:auto;

position:relative;

padding-top:85px;

}

/* BLUR */

body::before{

content:"";

position:absolute;

top:-100px;
left:-100px;

width:260px;
height:260px;

background:
rgba(59,130,246,.12);

border-radius:50%;

filter:blur(90px);

animation:float1 8s infinite;

}

body::after{

content:"";

position:absolute;

bottom:-100px;
right:-100px;

width:240px;
height:240px;

background:
rgba(99,102,241,.10);

border-radius:50%;

filter:blur(90px);

animation:float2 8s infinite;

}

/* NAVBAR */

.navbar{

width:100%;

height:72px;

padding:0 30px;

background:

rgba(
255,
255,
255,
.30
);

backdrop-filter:blur(14px);

border-bottom:

1px solid

rgba(
255,
255,
255,
.25
);

display:flex;

justify-content:space-between;

align-items:center;

position:fixed;

top:0;
left:0;

z-index:1000;

}

.logo{

font-size:24px;

font-weight:700;

}

.nav-links{

display:flex;

gap:12px;

flex-wrap:wrap;

}

.nav-links a{

text-decoration:none;

padding:10px 14px;

border-radius:8px;

color:#374151;

}

.nav-links a:hover{

background:
rgba(255,255,255,.4);

}

/* MAIN */

.main-wrapper{

min-height:

calc(
100vh - 90px
);

display:flex;

justify-content:center;

align-items:center;

padding:20px;

position:relative;

z-index:10;

}

/* CARD */

.container{

width:100%;

max-width:720px;

padding:40px;

border-radius:22px;

background:

rgba(
255,
255,
255,
.20
);

backdrop-filter:blur(18px);

border:

1px solid

rgba(
255,
255,
255,
.35
);

box-shadow:

0 20px 45px

rgba(
0,
0,
0,
.08
);

animation:fadeUp .8s ease;

}

.container h1{

font-size:42px;

margin-bottom:18px;

}

.container p{

line-height:1.8;

color:#4b5563;

margin-bottom:35px;

}

/* FORM */

form{

display:flex;

flex-direction:column;

}

input,
textarea{

width:100%;

padding:14px;

margin-bottom:15px;

border:

1px solid

rgba(
255,
255,
255,
.4
);

border-radius:10px;

background:

rgba(
255,
255,
255,
.55
);

outline:none;

}

textarea{

resize:none;

height:130px;

}

input:focus,
textarea:focus{

border-color:#6b7280;

box-shadow:

0 0 0 4px

rgba(
55,
65,
81,
.08
);

}

button{

padding:14px;

border:none;

border-radius:10px;

background:#374151;

color:white;

font-weight:600;

cursor:pointer;

}

button:hover{

transform:translateY(-2px);

}

.msg{

margin-top:16px;

text-align:center;

color:#16a34a;

font-weight:600;

display:none;

}

/* ANIMATION */

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes float1{

50%{
transform:translateY(-20px);
}

}

@keyframes float2{

50%{
transform:translateY(20px);
}

}

/* MOBILE */

@media(max-width:768px){

body{

padding-top:120px;

background-position:center top;

}

/* hide blur */

body::before,
body::after{

display:none;

}

.navbar{

height:auto;

padding:15px;

flex-direction:column;

gap:12px;

}

.logo{

font-size:22px;

}

.nav-links{

justify-content:center;

width:100%;

gap:8px;

}

.nav-links a{

padding:8px 10px;

font-size:14px;

}

.main-wrapper{

padding:25px 18px;

align-items:flex-start;

}

.container{

padding:24px;

border-radius:18px;

}

.container h1{

font-size:30px;

}

.container p{

font-size:15px;

margin-bottom:25px;

}

textarea{

height:110px;

}

}

</style>

</head>

<body>

<nav class="navbar">

<div class="logo">

NotesHub

</div>

<div class="nav-links">

<a href="{% url 'home' %}">
Home
</a>

<a href="{% url 'login' %}">
Login
</a>

<a href="{% url 'signup' %}">
Signup
</a>

<a href="{% url 'contact' %}">
Contact
</a>

</div>

</nav>

<div class="main-wrapper">

<div class="container">

<h1>

Contact Us

</h1>

<p>

Have questions, feedback or issues regarding notes and uploads?
Reach out to NotesHub support.

</p>

<form
id="contactForm"
method="POST"
>

{% csrf_token %}

<input
type="text"
name="name"
placeholder="Name"
required
>

<input
type="email"
name="email"
placeholder="Email"
required
>

<textarea
name="message"
placeholder="Message"
required
></textarea>

<button type="submit">

Send Message

</button>

</form>

<div
id="msg"
class="msg"
>

Message Sent Successfully

</div>

</div>

</div>

</body>

</html>
