<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

My Uploads - MCA NotesHub

</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
background:#f3f4f6;
overflow-x:hidden;
}



.menu-btn{

display:none;

position:fixed;

top:15px;
left:15px;

width:45px;
height:45px;

border:none;

border-radius:10px;

background:#111827;

color:white;

font-size:22px;

cursor:pointer;

z-index:2000;

}



.overlay{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,.4);

display:none;

z-index:1400;

}

.overlay.show{
display:block;
}



.sidebar{

width:230px;

height:100vh;

background:white;

padding:80px 20px 20px;

border-right:1px solid #d1d5db;

position:fixed;

left:0;
top:0;

overflow-y:auto;

z-index:1500;

transition:.3s;

}

.sidebar h2{
margin-bottom:30px;
}

.sidebar a{

display:block;

padding:12px;

margin:10px 0;

border-radius:8px;

text-decoration:none;

color:#4b5563;

}

.sidebar a:hover{

background:#e5e7eb;

}

.sidebar a.active{

background:#111827;

color:white;

font-weight:600;

}



.main{

margin-left:230px;

padding:25px;

}



.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

flex-wrap:wrap;

gap:15px;

}

.header h1{

font-size:40px;

}

.upload-btn{

background:#111827;

color:white;

padding:12px 18px;

border-radius:8px;

text-decoration:none;

font-weight:600;

}



.topbar{

display:flex;

gap:12px;

justify-content:center;

margin-bottom:25px;

flex-wrap:wrap;

}

.topbar input,
.topbar select{

padding:12px;

border:1px solid #d1d5db;

border-radius:10px;

min-width:220px;

}



.note-item{

background:white;

padding:22px;

border-radius:14px;

border:1px solid #d1d5db;

margin-bottom:15px;

display:flex;

justify-content:space-between;

align-items:center;

gap:20px;

flex-wrap:wrap;

}

.note-info h3{

font-size:28px;

margin-bottom:10px;

}

.note-info p{

color:#6b7280;

margin-bottom:6px;

}

.status{

padding:5px 10px;

border-radius:6px;

font-size:12px;

margin-left:10px;

}

.approved{

background:#22c55e;

color:white;

}

.pending{

background:#facc15;

}

.rejected{

background:#ef4444;

color:white;

}



.actions{

display:flex;

gap:10px;

flex-wrap:wrap;

}

.actions a,
.actions button{

padding:12px 16px;

border:none;

border-radius:8px;

font-weight:600;

cursor:pointer;

text-decoration:none;

}

.view{

background:#374151;

color:white;

}

.edit{

background:#e5e7eb;

}

.delete{

background:#ef4444;

color:white;

}



@media(max-width:768px){

.menu-btn{
display:block;
}

.sidebar{
left:-250px;
}

.sidebar.show{
left:0;
}

.main{

margin-left:0;

padding:90px 15px;

}

.note-item{

flex-direction:column;

align-items:flex-start;

}

.actions{

width:100%;

}

.actions a,
.actions button{

flex:1;

}

}

</style>

</head>

<body>

<button
class="menu-btn"
onclick="toggleSidebar()"
>

☰

</button>

<div
class="overlay"
id="overlay"
onclick="closeSidebar()"
>

</div>



<div
class="sidebar"
id="sidebar"
>

<h2>

NotesHub

</h2>

<a
href="{% url 'teacher_dashboard' %}"
>

Dashboard

</a>

<a
href="{% url 'teacher_dashboard' %}#upload"
>

Upload Notes

</a>

<a
href="{% url 'my_upload' %}"
class="active"
>

My Uploads

</a>

<a
href="{% url 'profile' %}"
>

Profile

</a>

<a
href="{% url 'logout' %}"
>

Logout

</a>

</div>



<div class="main">

<div class="header">

<h1>

My Uploads

</h1>

<a
href="{% url 'teacher_dashboard' %}#upload"
class="upload-btn"
>

+ Upload Notes

</a>

</div>

<div class="topbar">

<input
id="search"
placeholder="Search uploads..."
>

<select id="status">

<option value="">

All Status

</option>

<option>

Approved

</option>

<option>

Pending

</option>

<option>

Rejected

</option>

</select>

</div>

{% for note in notes %}

<div
class="note-item"

data-title="{{ note.title|lower }}"

data-status="{{ note.status }}"
>

<div class="note-info">

<h3>

{{ note.title }}

<span class="status {{ note.status|lower }}">

{{ note.status }}

</span>

</h3>

<p>

{{ note.subject }}

</p>

<p>

{{ note.uploaded_at }}

</p>

</div>

<div class="actions">

<a
href="{{ note.file.url }}"
target="_blank"
class="view"
>

View

</a>

<a
href="#"
class="edit"
>

Edit

</a>

<button
class="delete"
onclick="
this.closest(
'.note-item'
).remove()
"
>

Delete

</button>

</div>

</div>

{% empty %}

<h2>

No Uploads

</h2>

{% endfor %}

</div>

<script>

function toggleSidebar(){

sidebar.classList.toggle(
"show"
);

overlay.classList.toggle(
"show"
);

}

function closeSidebar(){

sidebar.classList.remove(
"show"
);

overlay.classList.remove(
"show"
);

}

</script>

</body>

</html>
